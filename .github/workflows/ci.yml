name: CI

on:
  push:
    branches:
      - main
      - feat/public-web-chat-backend
      - feat/web-chat-responsive-refresh
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Typecheck, test and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AGENT_INTERNAL_API_KEY: ci-test-internal-api-key

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.1
          package-manager-cache: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
          run_install: false

      - name: Show runtime versions
        run: |
          node --version
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Build shared package for runtime imports
        run: pnpm --filter @real-estate-agent/shared build

      - name: Run Agent Core tests
        run: pnpm --filter @real-estate-agent/agent-core test

      - name: Build workspace
        run: pnpm build
